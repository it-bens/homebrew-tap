name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Homebrew/actions has no tagged releases; pin the head of `main`.
      - uses: Homebrew/actions/setup-homebrew@98cfa07b984a61682e6cd3a0833fad2006cc84ba # main @ 2026-04-17

      # Scope `brew style` to Casks/*.rb so RuboCop only sees Ruby; running
      # it against the whole tap also lints README.md and fails on fenced
      # snippets like `it-bens/tap/cc-port` (ambiguous `-` / `/` precedence).
      # `brew audit` is item-scoped and is safe to run tap-wide.
      - name: Check for casks
        id: casks
        run: |
          if compgen -G 'Casks/*.rb' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No casks yet — skipping style/audit."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: brew style
        if: steps.casks.outputs.present == 'true'
        run: brew style Casks/*.rb

      - name: brew audit
        if: steps.casks.outputs.present == 'true'
        run: brew audit --strict --cask --tap=it-bens/tap
