name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Homebrew/actions has no tagged releases; pin the head of `main`.
      - uses: Homebrew/actions/setup-homebrew@98cfa07b984a61682e6cd3a0833fad2006cc84ba # main @ 2026-04-17

      # `brew style <tap>` also runs RuboCop over non-Ruby tap files (README,
      # LICENSE), where fenced snippets like `it-bens/tap/cc-port` get parsed
      # as Ruby and flagged for ambiguous `-` / `/` precedence. Scoping to
      # Formula/*.rb keeps the lint on actual formulas. `brew audit` is
      # already formula-scoped, so it runs tap-wide as usual.
      - name: Check for formulas
        id: formulas
        run: |
          if compgen -G 'Formula/*.rb' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No formulas yet — skipping style/audit."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: brew style
        if: steps.formulas.outputs.present == 'true'
        run: brew style Formula/*.rb

      - name: brew audit
        if: steps.formulas.outputs.present == 'true'
        run: brew audit --strict --tap=it-bens/tap
