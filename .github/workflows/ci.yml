name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Homebrew/actions has no tagged releases; pin the head of `main`.
      - uses: Homebrew/actions/setup-homebrew@98cfa07b984a61682e6cd3a0833fad2006cc84ba # main @ 2026-04-17

      # `brew style` is skipped intentionally: every cask here is
      # goreleaser-generated, never hand-edited, so cosmetic RuboCop
      # preferences add no value. `brew audit` still catches the things
      # that break installs (bad sha256, broken URL, deprecated DSL).
      - name: Check for casks
        id: casks
        run: |
          if compgen -G 'Casks/*.rb' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No casks yet — skipping audit."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: brew audit
        if: steps.casks.outputs.present == 'true'
        run: brew audit --strict --cask --tap=it-bens/tap
